<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Rack Manager Pro - Ultra Premium</title>
    <style>
/* --- TOOLTIP STYLES (NEW) --- */
.port-tooltip {
    position: absolute;
    background: rgba(13, 17, 23, 0.95);
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px;
    z-index: 9999;
    pointer-events: none;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    font-size: 11px;
    min-width: 180px;
    color: #c9d1d9;
}
.tt-header { color: #58a6ff; font-weight: bold; border-bottom: 1px solid #30363d; margin-bottom: 8px; padding-bottom: 4px; font-size: 12px; }
.tt-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
.tt-label { color: #8b949e; }
.tt-val { color: #ffffff; font-weight: 500; }
.stat-active { color: #238636; }
.stat-down { color: #f85149; }

/* --- ORIGINAL CSS --- */
.uplink-grid { 
    display: flex; 
    flex-direction: row !important; 
    gap: 10px; 
    padding-left: 15px; 
    margin-left: 10px;
    align-items: center; 
    justify-content: center;
    position: relative;
    align-self: stretch; 
}

.uplink-grid::before {
    content: "";
    position: absolute;
    left: 0;
    top: 10%;
    height: 80%; 
    border-left: 1px solid var(--border-color);
}        
:root { 
    --switch-color: #58a6ff; 
    --panel-color: #4CAF50; 
    --sidebar-bg: #161b22;
    --sidebar-hover: #21262d;
    --top-bar-height: 60px;
    --dark-ui: #0d1117;
    --border-color: #30363d;
    --text-main: #c9d1d9;
}

body { 
    font-family: 'Segoe UI', Arial, sans-serif; 
    margin: 0; display: flex; height: 100vh; 
    overflow: hidden; background-color: var(--dark-ui);
    color: var(--text-main);
}

.sidebar { 
    width: 280px; 
    background: var(--sidebar-bg); 
    border-right: 1px solid var(--border-color); 
    display: flex; flex-direction: column; z-index: 1050; 
}

.sidebar-header-container { position: relative; background: #0d1117; }

#idfSearch {
    width: 100%; padding: 10px; 
    background: #21262d; border: 1px solid var(--border-color); 
    border-radius: 6px; color: white; box-sizing: border-box;
}

.sidebar-item { padding: 12px; border-bottom: 1px solid var(--border-color); }

.rack-item { 
    display: flex; justify-content: space-between; align-items: center; 
    padding: 8px 15px; cursor: pointer; font-size: 13px; color: #8b949e;
    border-radius: 4px; margin: 2px 0;
}
.rack-item:hover { background: #30363d; color: white; }
.rack-item.active { background: #238636; color: white; font-weight: bold; }

.add-rack-ghost {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 15px; margin-top: 5px;
    font-size: 11px; font-weight: bold;
    color: #484f58; border: 1px dashed #30363d;
    border-radius: 4px; cursor: pointer;
    transition: 0.2s;
}
.add-rack-ghost:hover {
    color: #8b949e; border-color: #8b949e; background: rgba(255,255,255,0.03);
}

.port-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; min-height: 55px; }
/* ===== 3D PORT STYLE ===== */

.port{
    width:32px;
    height:32px;

    position:relative;

    background:
    linear-gradient(to bottom,#374151,#111827);

    border:1px solid #4b5563;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:10px;
    font-weight:bold;

    cursor:pointer;

    color:#9ca3af;
    z-index:2;

    border-radius:6px;

    box-shadow:
    inset 0 2px 2px rgba(255,255,255,0.08),
    inset 0 -3px 5px rgba(0,0,0,0.8),
    0 3px 6px rgba(0,0,0,0.5);

    transition:0.2s;
}

/* RJ45 SLOT */
.port::before{
    content:'';
    position:absolute;

    top:5px;

    width:14px;
    height:8px;

    background:#020617;

    border-radius:2px;

    box-shadow:
    inset 0 2px 4px rgba(255,255,255,0.03),
    inset 0 -2px 4px rgba(0,0,0,0.8);
}

/* LINK LED */
.port::after{
    content:'';
    position:absolute;

    bottom:4px;
    right:4px;

    width:5px;
    height:5px;

    border-radius:50%;
    background:#111827;
}

.port:hover{
    transform:translateY(-2px);
    box-shadow:
    inset 0 2px 2px rgba(255,255,255,0.08),
    inset 0 -3px 5px rgba(0,0,0,0.8),
    0 0 10px rgba(96,165,250,0.4);
}

.port.connected{
    border-color:#22c55e;
    color:white;

    box-shadow:
    inset 0 2px 2px rgba(255,255,255,0.08),
    inset 0 -3px 5px rgba(0,0,0,0.8),
    0 0 12px rgba(34,197,94,0.5);
}

.port.connected::after{
    background:#22c55e;

    box-shadow:
    0 0 5px #22c55e,
    0 0 10px #22c55e;
}
.port-tag { 
    width: 100%; background: transparent; border: none; color: transparent; 
    font-size: 9px; text-align: center; outline: none;
}
.edit-mode-active .port-tag { color: #8b949e; border-bottom: 1px solid #30363d; }
.port-tag:not(:placeholder-shown) { color: #8b949e; }

.main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
.top-bar { background: #161b22; height: var(--top-bar-height); padding: 0 20px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid var(--border-color); }

.rack-container { flex-grow: 1; padding: 40px; overflow: auto; background: #010409; display: flex; flex-direction: column; align-items: center; position: relative; padding-bottom: 150px; }
/* ===== 3D RACK ===== */

.rack-frame{
    background:
    linear-gradient(145deg,#1f2937,#111827);

    padding:30px;

    border:12px solid #2d3748;

    border-left:14px solid #4b5563;
    border-right:14px solid #0f172a;

    width:950px;

    border-radius:8px;

    position:relative;

    box-shadow:
    inset 0 0 20px rgba(255,255,255,0.03),
    0 20px 40px rgba(0,0,0,0.7);
}
/* ===== 3D DEVICE PANEL ===== */

.unit{
    background:
    linear-gradient(to bottom,#2b3442,#111827 40%,#0b1220);

    border:1px solid #3b4556;

    margin-bottom:25px;

    border-radius:10px;

    overflow:hidden;

    position:relative;

    box-shadow:
    inset 0 2px 2px rgba(255,255,255,0.05),
    inset 0 -8px 14px rgba(0,0,0,0.7),
    0 10px 20px rgba(0,0,0,0.5);
}

.unit::before{
    content:'';

    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:40%;

    background:
    linear-gradient(to bottom,
    rgba(255,255,255,0.08),
    transparent);

    pointer-events:none;
}.unit-body { display: flex; padding: 20px 15px; gap: 15px; align-items: flex-start; }

.port-grid { display: grid; grid-template-columns: repeat(24, 1fr); gap: 4px; flex-grow: 1; }
.port-grid.staggered{
    grid-template-columns: repeat(12, 1fr);

    grid-template-rows: repeat(2, auto);

    gap: 12px 10px;

    align-items:center;
}

/* ===== 3D HEADER ===== */

.unit-header{
    background:
    linear-gradient(to bottom,#374151,#111827);

    padding:8px 15px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    font-size:12px;
    color:white;

    border-bottom:1px solid #4b5563;

    box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.08),
    inset 0 -2px 4px rgba(0,0,0,0.6);
}
.btn { padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; border: 1px solid var(--border-color); background: #21262d; color: #c9d1d9; display: flex; align-items: center; gap: 5px; }
.btn:hover { background: #30363d; }

.switch-container { display: flex; align-items: center; gap: 10px; padding-right: 15px; border-right: 1px solid var(--border-color); }
.switch { position: relative; width: 40px; height: 20px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #30363d; transition: .4s; border-radius: 20px; }
.slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
input:checked + .slider { background-color: #238636; }
input:checked + .slider:before { transform: translateX(20px); }

.add-list-overlay { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
    background: var(--sidebar-bg); display: none; padding: 15px; box-sizing: border-box;
    align-items: center; z-index: 5;
}
.edit-mode-active .add-list-overlay { display: flex; }
.edit-only { display: none !important; }
.edit-mode-active .edit-only { display: flex !important; }

#svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
/* ===== REAL PATCH CABLE ===== */

.cable-path{
    stroke-width:5;
    fill:none;

    opacity:0.95;

    stroke-linecap:round;

    filter:
    drop-shadow(0 0 4px rgba(0,0,0,0.7))
    drop-shadow(0 0 2px currentColor);
}
    </style>
</head>
<body id="appBody">

<div id="masterTooltip" class="port-tooltip"></div>

<div class="sidebar">
    <div class="sidebar-header-container">
        <div id="searchContainer" style="padding:15px; border-bottom: 1px solid var(--border-color);">
            <input type="text" id="idfSearch" placeholder="🔍 Search IDF..." onkeyup="initSidebar()">
        </div>
        <div class="add-list-overlay">
            <button class="btn" style="width:100%; background:#238636; color:white; border:none;" onclick="addNewGroup()">+ CREATE NEW IDF LIST</button>
        </div>
    </div>
    <div id="sidebarContent" style="flex-grow:1; overflow-y:auto; padding: 10px;"></div>
</div>

<div class="main-content">
    <div class="top-bar">
        <div style="font-weight:bold; font-size:18px; margin-right: 10px;"><i class="fas fa-network-wired" style="color: #58a6ff;"></i> IDF NETWORK</div>
        
        <div class="switch-container">
            <label class="switch"><input type="checkbox" id="editModeToggle" onchange="toggleEditMode()"><span class="slider"></span></label>
            <span style="font-size:11px; font-weight:bold; color:#f85149;">EDIT MODE</span>
        </div>

        <div class="edit-only" style="gap:10px;">
            <button class="btn" onclick="undo()"><i class="fas fa-undo"></i></button>
            <button class="btn" onclick="redo()"><i class="fas fa-redo"></i></button>
            <select id="colorPick" class="btn">
                <option value="#58a6ff">Blue (POS)</option>
                <option value="#f85149">Red (Backbone)</option>
                <option value="#e3b341">Yellow</option>
            </select>
            <div style="width: 1px; height: 25px; background: var(--border-color); margin: 0 5px;"></div>
            <button class="btn" onclick="addNewUnit('panel')">+ Panel</button>
            <button class="btn" onclick="addNewUnit('switch')">+ Switch</button>
        </div>

        <div style="margin-left:auto; display:flex; gap:10px;">
            <button class="btn" onclick="saveAsImage()"><i class="fas fa-camera"></i></button>
            <button class="btn edit-only" onclick="resetCurrentRack()" style="background:#f85149; border:none; color:white;"><i class="fas fa-sync-alt"></i></button>
        </div>
    </div>

    <div class="rack-container" id="drawArea" onscroll="drawCables()">
        <svg id="svg-layer"></svg>
        <div id="rack-display" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
    </div>
</div>

<script>
    let appData = JSON.parse(localStorage.getItem('rackManagerV10')) || {
        lists: { l1: { name: "SUPERMARKET", racks: ["RACK 1"], blueprints: [[]] } },
        connections: [], portLabels: {}, portDetails: {}, currentList: 'l1', activeRackIndex: 0
    };

    let historyStack = [], redoStack = [], firstPort = null;

    function save() { localStorage.setItem('rackManagerV10', JSON.stringify(appData)); }
    function pushToHistory() { historyStack.push(JSON.stringify(appData)); redoStack = []; }

    function toggleEditMode() {
        const isEdit = document.getElementById('editModeToggle').checked;
        document.getElementById('appBody').classList.toggle('edit-mode-active', isEdit);
        initSidebar(); renderRack();
    }

    function initSidebar() {
        const cont = document.getElementById('sidebarContent');
        const search = document.getElementById('idfSearch').value.toUpperCase();
        const isEdit = document.getElementById('editModeToggle').checked;
        cont.innerHTML = '';

        Object.keys(appData.lists).forEach(id => {
            const list = appData.lists[id];
            if(!list.name.includes(search)) return;

            const div = document.createElement('div');
            div.className = 'sidebar-item';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <div style="display:flex; gap:8px; align-items:center;">
                        <span style="color:#58a6ff; font-size:12px;"><i class="fas fa-folder"></i></span>
                        <strong style="color:white; font-size:14px;">${list.name}</strong>
                        ${isEdit ? `<i class="fas fa-pencil-alt" style="font-size:10px; cursor:pointer; color:#8b949e;" onclick="renameGroup('${id}')"></i>` : ''}
                    </div>
                    ${isEdit ? `<i class="fas fa-trash-alt" style="color:#f85149; cursor:pointer; font-size:11px;" onclick="deleteGroup('${id}')"></i>` : ''}
                </div>`;
            
            list.racks.forEach((r, idx) => {
                const rDiv = document.createElement('div');
                const isActive = (appData.currentList===id && appData.activeRackIndex===idx);
                rDiv.className = `rack-item ${ isActive ? 'active' : '' }`;
                rDiv.innerHTML = `
                    <div style="display:flex; align-items:center; gap:8px; flex-grow:1;" onclick="selectRack('${id}', ${idx})">
                        <i class="fas fa-server" style="font-size:10px; opacity:0.7;"></i>
                        <span>${r}</span>
                    </div>
                    ${isEdit ? `
                        <div style="display:flex; gap:8px;">
                            <i class="fas fa-pencil-alt" style="font-size:10px; cursor:pointer; opacity:0.5;" onclick="renameRack('${id}', ${idx})"></i>
                            <i class="fas fa-times" style="font-size:10px; cursor:pointer; opacity:0.5;" onclick="deleteRack('${id}', ${idx})"></i>
                        </div>` : ''}
                `;
                div.appendChild(rDiv);
            });

            if(isEdit) {
                const addBtn = document.createElement('div');
                addBtn.className = 'add-rack-ghost';
                addBtn.innerHTML = `<i class="fas fa-plus"></i> ADD RACK`;
                addBtn.onclick = () => addNewRackToGroup(id);
                div.appendChild(addBtn);
            }

            cont.appendChild(div);
        });
    }

    function selectRack(id, idx) {
        appData.currentList = id; appData.activeRackIndex = idx;
        initSidebar(); renderRack();
    }

    function renderRack() {
        const display = document.getElementById('rack-display');
        const list = appData.lists[appData.currentList];
        const rackIdx = appData.activeRackIndex;
        const isEdit = document.getElementById('editModeToggle').checked;
        
        if (!list || !list.racks[rackIdx]) return;

        display.innerHTML = `<h2 style="color:white; margin-bottom:20px;">${list.name} - ${list.racks[rackIdx]}</h2>`;
        const frame = document.createElement('div');
        frame.className = 'rack-frame';

        const units = list.blueprints[rackIdx] || [];
        units.forEach(uId => {
            const isSwitch = uId.includes('switch');
            const customName = appData.portLabels[`unitName-${uId}`] || (isSwitch ? "SWITCH" : "PATCH PANEL");
            const unit = document.createElement('div');

            unit.className = 'unit';
            unit.innerHTML = `
                <div class="unit-header">
                    <strong>${customName}</strong>
                    <div class="unit-controls edit-only">
                        <button class="btn" style="padding:2px 6px" onclick="renameUnit('${uId}')"><i class="fas fa-pencil-alt"></i></button>
                        <button class="btn" style="padding:2px 6px; background:#f85149; border:none;" onclick="removeUnit('${uId}')"><i class="fas fa-times"></i></button>
                    </div>
                </div>
                <div class="unit-body">
                    <div class="port-grid ${isSwitch ? 'staggered' : ''}"></div>
                   ${isSwitch ? '<div class="uplink-grid"></div>' : ''}
                </div>`;
            
     const grid = unit.querySelector('.port-grid');

if(isSwitch){

    // ODD TOP / EVEN BOTTOM
    const switchPorts = [];

    for(let i=1; i<=24; i+=2){
        switchPorts.push(i);
    }

    for(let i=2; i<=24; i+=2){
        switchPorts.push(i);
    }

    switchPorts.forEach(pNum=>{
        grid.appendChild(createPort(uId, pNum, isEdit));
    });

    // KEEP 25/26 UPLINK POSITION
    const upGrid = unit.querySelector('.uplink-grid');

    if(upGrid){
        for(let i=25; i<=26; i++){
            upGrid.appendChild(createPort(uId, i, isEdit));
        }
    }

}else{

    // PATCH PANEL NORMAL 1-24
    for(let i=1; i<=24; i++){
        grid.appendChild(createPort(uId, i, isEdit));
    }

}
            frame.appendChild(unit);
        });
        display.appendChild(frame);
        setTimeout(drawCables, 50);
    }

    function createPort(uId, pNum, isEdit) {
        const fID = `${appData.currentList}-${appData.activeRackIndex}-${uId}-p${pNum}`;
        const wrap = document.createElement('div');
        wrap.className = 'port-wrapper';

        const p = document.createElement('div');
        p.id = `port-${fID}`;
        p.className = `port ${appData.connections.some(c => c.from === fID || c.to === fID) ? 'connected' : ''}`;
        p.textContent = pNum;

        // Tooltip Events
        p.onmouseenter = (e) => showTooltip(fID, e);
        p.onmouseleave = hideTooltip;
        p.onclick = () => handlePortClick(fID, isEdit, p);

        const input = document.createElement('input');
        input.className = 'port-tag';
        input.value = appData.portLabels[fID] || "";
        input.placeholder = "---";
        input.disabled = !isEdit;
        input.onchange = (e) => { pushToHistory(); appData.portLabels[fID] = e.target.value.toUpperCase(); save(); };

        wrap.appendChild(p); wrap.appendChild(input);
        return wrap;
    }

    function showTooltip(fID, e) {
        const tooltip = document.getElementById('masterTooltip');
        const detail = appData.portDetails[fID] || { ip: "---", end: "---", vlan: "---", stat: "Active" };
        const label = appData.portLabels[fID] || "Untagged";
        
        // Find if connected
        const conn = appData.connections.find(c => c.from === fID || c.to === fID);
        let connectionPath = "No Link";
        if(conn) {
            const other = conn.from === fID ? conn.to : conn.from;
            const parts = other.split('-');
            connectionPath = `${parts[2].split('-')[0].toUpperCase()} Port ${parts[parts.length-1].replace('p','')}`;
        }

        tooltip.innerHTML = `
            <div class="tt-header">Port ${fID.split('-').pop().replace('p','')} - ${label}</div>
            <div class="tt-row"><span class="tt-label">End-to-End:</span><span class="tt-val">${connectionPath}</span></div>
            <div class="tt-row"><span class="tt-label">Endpoint:</span><span class="tt-val">${detail.end}</span></div>
            <div class="tt-row"><span class="tt-label">IP:</span><span class="tt-val">${detail.ip}</span></div>
            <div class="tt-row"><span class="tt-label">VLAN:</span><span class="tt-val">${detail.vlan}</span></div>
            <div class="tt-row"><span class="tt-label">Status:</span><span class="tt-val ${detail.stat === 'Active' ? 'stat-active' : 'stat-down'}">${detail.stat}</span></div>
        `;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.pageX + 15) + 'px';
        tooltip.style.top = (e.pageY + 15) + 'px';
    }

    function hideTooltip() { document.getElementById('masterTooltip').style.display = 'none'; }

    function handlePortClick(fID, isEdit, el) {
        if(!isEdit) {
            const cur = appData.portDetails[fID] || { ip: "---", end: "---", vlan: "---", stat: "Active" };
            const end = prompt("Endpoint Name:", cur.end);
            if(end === null) return;
            const ip = prompt("IP Address:", cur.ip);
            const vlan = prompt("VLAN ID:", cur.vlan);
            const stat = prompt("Status (Active/Down):", cur.stat);

            pushToHistory();
            appData.portDetails[fID] = { 
                end: end.toUpperCase(), 
                ip: ip || "---", 
                vlan: vlan || "---", 
                stat: stat || "Active" 
            };
            save(); renderRack();
            return;
        }

        if(!firstPort) {
            firstPort = {id: fID, el: el};
            el.style.background = "#ca8a04";
        } else {
            if(firstPort.id !== fID) {
                pushToHistory();
                appData.connections.push({ from: firstPort.id, to: fID, color: document.getElementById('colorPick').value });
                save();
            }
            firstPort = null; renderRack();
        }
    }

    function drawCables() {
        const svg = document.getElementById('svg-layer');
        const area = document.getElementById('drawArea');
        if(!svg) return;
        svg.innerHTML = '';
        svg.setAttribute('width', area.scrollWidth);
        svg.setAttribute('height', area.scrollHeight);
        const rect = area.getBoundingClientRect();

        appData.connections.forEach(c => {
            const e1 = document.getElementById(`port-${c.from}`);
            const e2 = document.getElementById(`port-${c.to}`);
            if(e1 && e2) {
                const b1 = e1.getBoundingClientRect(); const b2 = e2.getBoundingClientRect();
                const x1 = b1.left - rect.left + area.scrollLeft + b1.width/2;
                const y1 = b1.top - rect.top + area.scrollTop + b1.height/2;
                const x2 = b2.left - rect.left + area.scrollLeft + b2.width/2;
                const y2 = b2.top - rect.top + area.scrollTop + b2.height/2;
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${x1} ${y1} C ${x1} ${y1+40} ${x2} ${y2-40} ${x2} ${y2}`);
                path.setAttribute("stroke", c.color);
                path.classList.add("cable-path");
                svg.appendChild(path);
            }
        });
    }

    function addNewGroup() {
        const name = prompt("IDF Name:");
        if(name) {
            const id = 'l' + Date.now();
            appData.lists[id] = { name: name.toUpperCase(), racks: ["RACK 1"], blueprints: [[]] };
            appData.currentList = id; appData.activeRackIndex = 0;
            save(); initSidebar(); renderRack();
        }
    }

    function addNewRackToGroup(groupId) {
        const name = prompt("Rack Name:", "RACK " + (appData.lists[groupId].racks.length + 1));
        if(name) {
            appData.lists[groupId].racks.push(name.toUpperCase());
            appData.lists[groupId].blueprints.push([]);
            save(); initSidebar();
        }
    }

    function renameGroup(id) { const n = prompt("Rename IDF:", appData.lists[id].name); if(n) { appData.lists[id].name = n.toUpperCase(); save(); initSidebar(); } }
    function renameRack(id, idx) { const n = prompt("Rename Rack:", appData.lists[id].racks[idx]); if(n) { appData.lists[id].racks[idx] = n.toUpperCase(); save(); initSidebar(); renderRack(); } }
    function deleteGroup(id) { if(confirm("Delete entire IDF?")) { delete appData.lists[id]; appData.currentList = Object.keys(appData.lists)[0]; save(); initSidebar(); renderRack(); } }
    function deleteRack(id, idx) { if(confirm("Delete this rack?")) { appData.lists[id].racks.splice(idx, 1); appData.lists[id].blueprints.splice(idx, 1); appData.activeRackIndex = 0; save(); initSidebar(); renderRack(); } }
    function addNewUnit(type) { pushToHistory(); appData.lists[appData.currentList].blueprints[appData.activeRackIndex].push(`${type}-${Date.now()}`); save(); renderRack(); }
    function renameUnit(uId) { const n = prompt("Unit Name:"); if(n) { appData.portLabels[`unitName-${uId}`] = n.toUpperCase(); save(); renderRack(); } }
    function removeUnit(uId) { if(confirm("Remove unit?")) { appData.lists[appData.currentList].blueprints[appData.activeRackIndex] = appData.lists[appData.currentList].blueprints[appData.activeRackIndex].filter(id => id !== uId); save(); renderRack(); } }
    function undo() { if(historyStack.length) { redoStack.push(JSON.stringify(appData)); appData = JSON.parse(historyStack.pop()); save(); renderRack(); } }
    function redo() { if(redoStack.length) { historyStack.push(JSON.stringify(appData)); appData = JSON.parse(redoStack.pop()); save(); renderRack(); } }
    function resetCurrentRack() { if(confirm("Clear all connections?")) { appData.connections = []; save(); renderRack(); } }
    function saveAsImage() { html2canvas(document.getElementById('drawArea')).then(canvas => { const link = document.createElement('a'); link.download = 'RackLayout.png'; link.href = canvas.toDataURL(); link.click(); }); }

    window.onresize = drawCables;
    window.onload = () => { initSidebar(); renderRack(); };
</script>
</body>
</html>
